version: '3.9'

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: bsecure
      POSTGRES_USER: bsecure
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bsecure"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: bsecure_dev
      MINIO_ROOT_PASSWORD: dev_password_123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 bsecure_dev dev_password_123;
      mc mb --ignore-existing local/bsecure-dev;
      mc anonymous set download local/bsecure-dev/static;
      exit 0;
      "

  api:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - media_files:/app/media
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DB_HOST: db
      DB_NAME: bsecure
      DB_USER: bsecure
      DB_PASSWORD: dev_password
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      REDIS_CELERY_URL: redis://redis:6379/1
      REDIS_CHANNELS_URL: redis://redis:6379/2
      AWS_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: bsecure_dev
      AWS_SECRET_ACCESS_KEY: dev_password_123
      AWS_STORAGE_BUCKET_NAME: bsecure-dev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  celery_worker:
    build: .
    command: celery -A celery_app worker -Q high_priority,default,low_priority -l info --concurrency=4
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DB_HOST: db
      DB_NAME: bsecure
      DB_USER: bsecure
      DB_PASSWORD: dev_password
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      REDIS_CELERY_URL: redis://redis:6379/1
      REDIS_CHANNELS_URL: redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build: .
    command: celery -A celery_app beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DB_HOST: db
      DB_NAME: bsecure
      DB_USER: bsecure
      DB_PASSWORD: dev_password
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      REDIS_CELERY_URL: redis://redis:6379/1
      REDIS_CHANNELS_URL: redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
  media_files:
