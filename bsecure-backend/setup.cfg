[flake8]
max-line-length = 88
extend-ignore = E203, W503, E501
exclude =
    .git,
    __pycache__,
    migrations,
    .venv,
    venv

[isort]
profile = black
known_django = django
known_drf = rest_framework
sections = FUTURE,STDLIB,DJANGO,DRF,THIRDPARTY,FIRSTPARTY,LOCALFOLDER
default_section = THIRDPARTY
skip = migrations

[coverage:run]
source = apps
omit =
    */migrations/*
    */tests/*
    */admin.py
    manage.py
    celery_app.py

[coverage:report]
show_missing = True
skip_covered = False
fail_under = 80
